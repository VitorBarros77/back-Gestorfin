# ===================================================
# ARQUIVO: src/main/resources/application.properties
# ===================================================
# Este arquivo configura a conexão com o banco de dados e o comportamento do Spring Boot.
# Linhas que começam com "#" são comentários — o Spring as ignora.

# Nome do seu projeto (aparece nos logs)
spring.application.name=GestorFin

# -------------------------------------------------------
# CONFIGURAÇÃO DO BANCO DE DADOS (Aiven Cloud)
# -------------------------------------------------------

# URL de conexão com o banco. Formato: jdbc:mysql://HOST:PORTA/NOME_DO_BANCO
# Parâmetros após "?" são configurações extras:
#   sslMode=REQUIRED → conexão criptografada (obrigatório no Aiven)
#   serverTimezone=America/Sao_Paulo → fuso horário correto para datas
spring.datasource.url=jdbc:mysql://gestorfin-pcgamer2207-21c9.c.aivencloud.com:20863/gestorfin?sslMode=REQUIRED&serverTimezone=America/Sao_Paulo

# Usuário do banco
spring.datasource.username=avnadmin

# Senha do banco
# OPÇÃO 1 (recomendado): usar variável de ambiente para não expor a senha no código
# spring.datasource.password=${DB_PASSWORD}
#
# OPÇÃO 2 (mais simples para desenvolvimento local): colocar a senha diretamente
# Substitua SUA_SENHA_AQUI pela senha real do banco Aiven
spring.datasource.password= 99ew0a90awe9w0

# Driver JDBC para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# CONFIGURAÇÃO DO JPA (Java Persistence API)
# -------------------------------------------------------

# Dialeto do banco: diz ao Hibernate qual "sabor" de SQL usar
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto=none → o Spring NÃO cria/altera tabelas automaticamente.
# Como seu banco já existe, essa é a configuração correta.
# NUNCA use "create" ou "create-drop" em banco com dados reais — apaga tudo!
spring.jpa.hibernate.ddl-auto=none

# show-sql=true → mostra as queries SQL executadas no console.
# Ótimo para aprendizado! Você verá exatamente o que o Spring faz no banco.
spring.jpa.show-sql=true

# format_sql=true → formata o SQL de forma legível no console
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# NOTA SOBRE O CERTIFICADO SSL (ca.pem)
# -------------------------------------------------------
# Antes, seu application.properties tinha:
#   sslrootcert=/workspaces/Aplicativo-Monet-rio/GestorFin/ca.pem
#
# Esse caminho só funciona no GitHub Codespaces.
# Na sua máquina local, você teria que colocar o caminho correto do arquivo ca.pem.
# Se não quiser usar o certificado localmente, a configuração acima (sslMode=REQUIRED)
# já deve funcionar para a maioria dos casos com o Aiven.
# -------------------------------------------------------
